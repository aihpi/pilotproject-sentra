services:
  backend:
    build:
      context: ./02_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./03_data:/data
    depends_on:
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./01_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
