# Copy this file to secret.yaml and fill in real values:
#   cp example-secret.yaml secret.yaml
#
# Then apply:
#   kubectl apply -f secret.yaml -n sentra
#
# IMPORTANT: secret.yaml is gitignored — never commit real secrets!
apiVersion: v1
kind: Secret
metadata:
  name: sentra-secret
  namespace: sentra
type: Opaque
stringData:
  AI_HUB_API_KEY: "YOUR_AISC_API_KEY_HERE"
